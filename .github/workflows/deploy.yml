name: Deploy to EdgeOne Makers
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bunx edgeone makers deploy ./dist -n makers-o6uinjdxpnne -t ${{ secrets.EDGEONE_API_TOKEN }}
