- generic [active] [ref=e1]:
  - banner [ref=e2]:
    - heading "Fediring.net" [level=1] [ref=e3]
    - paragraph [ref=e4]: Webring for fedizens
  - paragraph [ref=e5]: Welcome o/
  - paragraph [ref=e6]:
    - text: This
    - link "webring" [ref=e7] [cursor=pointer]:
      - /url: https://en.wikipedia.org/wiki/Webring
    - text: is for the personal sites of any member of the
    - link "fediverse" [ref=e8] [cursor=pointer]:
      - /url: https://en.wikipedia.org/wiki/Fediverse
    - text: (also known as fedizens). Head towards the bottom of the page to see a
    - link "table of members" [ref=e9] [cursor=pointer]:
      - /url: "#table-of-members"
    - text: or continue on to read the rules and how to join :)
  - heading "Membership Rules" [level=2] [ref=e10]
  - paragraph [ref=e11]: We accept pretty much any site as long as the owner has an account on fedi. However, we do draw the line at…
  - list [ref=e12]:
    - listitem [ref=e13]: Hate speech
    - listitem [ref=e14]: Racism, sexism, any kind of bigotry
    - listitem [ref=e15]: Advertisement-focused sites
  - paragraph [ref=e16]:
    - text: As it is impossible to list
    - emphasis [ref=e17]: everything
    - text: that would not be acceptable, we do reserve the right to deny requests. If you want to know whether your site is suitable for inclusion, send a plaintext email to the ticket tracker (address below) and we’ll take a look at it!
  - paragraph [ref=e18]:
    - text: One of our requirements for joining is that you
    - emphasis [ref=e19]: must
    - text: have an HTTPS (TLS encryption is required) site on a clearnet domain. Paths are acceptable, e.g.
    - code [ref=e20]: sometilde.service/~username
    - text: ", but"
    - emphasis [ref=e21]: this
    - text: webring is dedicated to clearnet, HTTPS sites. See our other *rings below for more platforms/protocols, such as Gemini.
  - paragraph [ref=e22]: We also tend not to accept fediverse accounts that were recently created or those that have very little activity. This is both an anti-spam measure and a quality assurance measure, as we want to fill the ring with a vibrant and active community of fediverse users.
  - heading "Joining" [level=2] [ref=e23]
  - paragraph [ref=e24]:
    - strong [ref=e25]: First, add the fediring links to your site’s homepage
    - text: or to a location that is
    - strong [ref=e26]: easily found
    - text: by visitors to your site. Replace
    - code [ref=e27]: YOURDOMAIN
    - text: "with your site’s domain in the examples below:"
  - table [ref=e28]:
    - rowgroup [ref=e32]:
      - row "Destination Link" [ref=e33]:
        - columnheader "Destination" [ref=e34]
        - columnheader "Link" [ref=e35]
    - rowgroup [ref=e36]:
      - row "Previous member https://fediring.net/previous?host=YOURDOMAIN" [ref=e37]:
        - cell "Previous member" [ref=e38]
        - cell "https://fediring.net/previous?host=YOURDOMAIN" [ref=e39]:
          - link "https://fediring.net/previous?host=YOURDOMAIN" [ref=e40] [cursor=pointer]:
            - /url: https://fediring.net/previous?host=YOURDOMAIN
      - row "Next member https://fediring.net/next?host=YOURDOMAIN" [ref=e41]:
        - cell "Next member" [ref=e42]
        - cell "https://fediring.net/next?host=YOURDOMAIN" [ref=e43]:
          - link "https://fediring.net/next?host=YOURDOMAIN" [ref=e44] [cursor=pointer]:
            - /url: https://fediring.net/next?host=YOURDOMAIN
      - row "Home page https://fediring.net" [ref=e45]:
        - cell "Home page" [ref=e46]
        - cell "https://fediring.net" [ref=e47]:
          - link "https://fediring.net" [ref=e48] [cursor=pointer]:
            - /url: https://fediring.net
  - paragraph [ref=e49]:
    - text: If you would like, you can also link to
    - link "fediring.net/random" [ref=e50] [cursor=pointer]:
      - /url: https://fediring.net/random
    - text: ; it directs visitors to a random site in the ring. This one is optional though.
  - paragraph [ref=e51]: Here’s some example HTML for linking to the next and previous ring members.
  - code [ref=e54]:
    - generic [ref=e55]: <p>
    - generic [ref=e56]: <a href="https://fediring.net/previous?host=example.com">←</a>
    - generic [ref=e57]: <a href="https://fediring.net/">Fediring</a>
    - generic [ref=e58]: <a href="https://fediring.net/next?host=example.com">→</a>
    - generic [ref=e59]: </p>
  - paragraph [ref=e60]: "It will look like this:"
  - paragraph [ref=e61]:
    - link "←" [ref=e62] [cursor=pointer]:
      - /url: https://fediring.net/previous?host=example.com
    - link "Fediring" [ref=e63] [cursor=pointer]:
      - /url: https://fediring.net/
    - link "→" [ref=e64] [cursor=pointer]:
      - /url: https://fediring.net/next?host=example.com
  - paragraph [ref=e65]:
    - text: If your site is on a
    - emphasis [ref=e66]: path
    - text: rather than the root domain, you’ll need to URL-encode any special characters. For example, if Sam’s site is
    - code [ref=e67]: sometilde.com/~sam
    - text: ", she will need the following links on her page."
  - list [ref=e68]:
    - listitem [ref=e69]:
      - code [ref=e70]: https://fediring.net/next?host=sometilde.com%2F~sam
    - listitem [ref=e71]:
      - code [ref=e72]: https://fediring.net/previous?host=sometilde.com%2F~sam
  - paragraph [ref=e73]:
    - text: After that, simply send a
    - link "plaintext email" [ref=e74] [cursor=pointer]:
      - /url: https://useplaintext.email
    - text: to
    - link "~jbauer/fediring@todo.sr.ht" [ref=e75] [cursor=pointer]:
      - /url: mailto:~jbauer/fediring@todo.sr.ht
    - text: "(yes, that’s an email address) containing the following:"
  - list [ref=e76]:
    - listitem [ref=e77]: A link to your website
    - listitem [ref=e78]: A link to your Fediverse account
  - paragraph [ref=e79]:
    - text: This will create a new ticket in
    - link "our public issue tracker" [ref=e80] [cursor=pointer]:
      - /url: https://todo.sr.ht/~jbauer/fediring
    - text: and notify maintainers so they can review it and get it added!
  - paragraph [ref=e81]:
    - text: Please note that sites listed on the fediring
    - emphasis [ref=e82]: without
    - text: the links above are subject to removal. Removing these links from your site breaks the ring and ruins the experience for everyone; if ring administrators traverse the ring and notice that the links have been removed, they’ll remove your site from the ring.
  - heading "Badges" [level=2] [ref=e83]
  - paragraph [ref=e84]:
    - text: One of the fediring members
    - link "contributed a badge" [ref=e85] [cursor=pointer]:
      - /url: https://todo.sr.ht/~jbauer/fediring/322#event-250964
    - text: "! Anyone is welcome to include this on their website in addition to the required links."
  - paragraph [ref=e86]:
    - link "fediring badge" [ref=e87] [cursor=pointer]:
      - /url: https://fediring.net
      - img "fediring badge" [ref=e88]
  - heading "Additional *rings" [level=2] [ref=e89]
  - paragraph [ref=e90]:
    - text: We also operate a
    - link "Gemini" [ref=e91] [cursor=pointer]:
      - /url: https://geminiquickst.art/
    - text: "ring that’s accessible over this same domain:"
    - link "fediring.net" [ref=e92] [cursor=pointer]:
      - /url: gemini://fediring.net
    - text: .
  - paragraph [ref=e93]: If there’s interest, we might set up an Onionring for sites accessible over Tor, but we are unlikely to consider operating *rings for alternative protocols such as I2P, Freenet, Dat, Hypercore, etc.
